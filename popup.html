<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YTM Trimmer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 12px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      background: #4caf50;
      border-radius: 3px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin: 12px 0 6px;
    }

    /* ── Current song remote ─────────────────────────── */
    #current-song {
      background: #252525;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 4px;
    }

    #current-song-id {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    #current-song-times {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 8px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
    }

    .ytm-popup-btn {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
      transition: background 0.15s;
    }

    .ytm-popup-btn:hover { background: #ff6666; }
    .ytm-popup-btn:active { background: #dd3333; }

    .ytm-popup-btn.green { background: #4caf50; }
    .ytm-popup-btn.green:hover { background: #66bb6a; }
    .ytm-popup-btn.green:active { background: #388e3c; }

    .ytm-popup-btn.orange { background: #ff9800; }
    .ytm-popup-btn.orange:hover { background: #ffa726; }
    .ytm-popup-btn.orange:active { background: #f57c00; }

    .ytm-popup-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    #not-ytm {
      display: none;
      background: #252525;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-bottom: 4px;
    }

    /* ── Search bar ────────────────────────────────────────────────────────── */
    .song-search {
      width: 100%;
      background: #252525;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 6px 10px;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .song-search:focus {
      border-color: #4caf50;
    }

    .song-search::placeholder {
      color: #555;
    }

    /* ── Saved songs list ─────────────────────────────── */
    .song-list {
      max-height: 240px;
      overflow-y: auto;
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      background: #252525;
      margin-bottom: 6px;
    }

    .song-item:hover { background: #2e2e2e; }

    .song-info { flex: 1; min-width: 0; }

    .song-video-id {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-times {
      font-size: 12px;
      color: #ccc;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 9px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider { background: #4caf50; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(14px); }

    .empty-state {
      text-align: center;
      color: #555;
      padding: 16px 0;
      font-size: 12px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      margin-left: 6px;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
    }

    .delete-btn:hover {
      color: #ff4444;
      background: rgba(255, 68, 68, 0.1);
    }

    /* ── Footer shortcuts ────────────────────────────── */
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2a2a2a;
      font-size: 11px;
      color: #444;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shortcut-hint {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    kbd {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <h1>YTM Trimmer</h1>

  <div id="not-ytm">Open a song on music.youtube.com<br />to use remote controls</div>

  <div id="current-song" style="display:none">
    <div id="current-song-id">Loading...</div>
    <div id="current-song-times">—</div>
    <div class="btn-row">
      <button class="ytm-popup-btn green" id="btn-set-start">Set Start</button>
      <button class="ytm-popup-btn orange" id="btn-set-interval">Set Int.</button>
      <button class="ytm-popup-btn" id="btn-set-end">Set End</button>
    </div>
  </div>

  <div class="section-title">Saved Songs</div>
  <input type="text" id="song-search" class="song-search" placeholder="Search by song name..." />
  <div class="song-list" id="song-list">
    <div class="empty-state" id="empty-state">Loading...</div>
  </div>
  <div class="empty-state" id="song-not-found" style="display:none">Not Found</div>

  <div class="footer">
    <span class="shortcut-hint"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>S</kbd> Start</span>
    <span class="shortcut-hint"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>D</kbd> Int.</span>
    <span class="shortcut-hint"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>E</kbd> End</span>
    <span class="shortcut-hint"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>Y</kbd> Panel</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
